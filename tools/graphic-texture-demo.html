<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synths Lab Graphic Texture V1.3</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;300;400;500;600&display=swap");

      @font-face {
        font-family: "TE20";
        src: url("../assets/TE20L.woff2") format("woff2");
        font-weight: 300;
      }

      :root {
        --black: #0b0b0f;
        --ink: #151519;
        --panel: #101014;
        --panel-2: #17171c;
        --line: #303036;
        --paper: #f4f3ef;
        --muted: #9ea2ad;
        --soft: #c7cad1;
        --yellow: #ffd25a;
        --orange: #ff682c;
        --brown: #5a3b22;
        --font-mono: "IBM Plex Mono", "TE20", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --font-cn: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle, rgba(12, 12, 16, 0.055) 1px, transparent 1.5px) 0 0 / 18px 18px,
          #efefed;
        color: var(--black);
        font-family: var(--font-mono);
      }

      button,
      input {
        font: inherit;
      }

      .title,
      .drop-title,
      .preset,
      .button,
      .node-name,
      .param-title strong,
      .color-hex-readout,
      .color-popover .hex,
      .small-card h3 {
        font-family: var(--font-mono);
        font-weight: 300;
        letter-spacing: -0.05em;
      }

      h2,
      .desc,
      .preset small,
      .note,
      .node-desc,
      .param-title span,
      .label,
      .color-kind,
      .check {
        font-family: var(--font-cn);
        font-weight: 300;
        letter-spacing: 0;
      }

      .app {
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-columns: 360px 1fr 360px;
      }

      .side,
      .right {
        height: 100vh;
        min-height: 0;
        background: #0d0d11;
        color: var(--paper);
      }

      .side {
        display: flex;
        flex-direction: column;
        border-right: 1px solid #27272d;
      }

      .right {
        border-left: 1px solid #27272d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .right-scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        scrollbar-width: none;
      }

      .right-scroll::-webkit-scrollbar,
      .side-scroll::-webkit-scrollbar {
        display: none;
      }

      .brand {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        min-height: 118px;
        padding: 30px 28px;
        border-bottom: 1px solid #27272d;
      }

      .brand img {
        width: 262px;
        display: block;
      }

      .side-scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        scrollbar-width: none;
      }

      .panel {
        padding: 24px 28px;
        border-bottom: 1px solid #27272d;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 31px;
        line-height: 1.04;
        font-weight: 300;
      }

      h2 {
        margin-bottom: 16px;
        color: #b6bac4;
        font-size: 20px;
      }

      .desc {
        margin-top: 12px;
        color: #a8abb4;
        font-size: 15px;
        line-height: 1.55;
      }

      .drop {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        height: 152px;
        border: 1px solid #4a4a50;
        background: #dcdcdc;
        color: #111116;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .drop:hover,
      .drop.drag {
        border-color: var(--yellow);
        background: #f4f3ef;
      }

      .drop:active {
        transform: translateY(1px);
      }

      .drop input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        z-index: 5;
        appearance: none;
      }

      .drop-content {
        width: 100%;
        padding: 0 16px;
        text-align: center;
        transform: translateY(8px);
      }

      .drop-title {
        font-size: 54px;
        line-height: 1;
        text-align: center;
      }

      .drop-sub {
        margin-top: 15px;
        color: #37373d;
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 300;
        line-height: 1.25;
        letter-spacing: -0.05em;
        text-align: center;
      }

      .side-previews {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .side-preview {
        display: grid;
        grid-template-rows: 28px 112px;
        min-width: 0;
        border: 1px solid #44444a;
        background: #111115;
        overflow: hidden;
      }

      .side-preview h3 {
        margin: 0;
        padding: 6px 8px 0;
        border-bottom: 1px solid #44444a;
        color: #b6bac4;
        font-size: 14px;
        font-weight: 300;
      }

      .side-preview canvas {
        display: block;
        width: 100%;
        height: 112px;
        object-fit: contain;
        background: #f4f3ef;
      }

      .preset-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .preset,
      .button,
      .icon-btn {
        border: 0;
        border-radius: 0;
        cursor: pointer;
      }

      .preset {
        min-height: 50px;
        padding: 8px 10px;
        background: #222227;
        color: var(--paper);
        text-align: left;
        transition: background 160ms ease, transform 160ms ease;
      }

      .preset:hover {
        background: #2e2e34;
      }

      .preset.active {
        background: var(--yellow);
        color: #08080a;
      }

      .preset small {
        display: block;
        margin-top: 5px;
        color: currentColor;
        opacity: 0.62;
        font-family: var(--font-cn);
        font-size: 13px;
        line-height: 1.35;
      }

      .randomize-button {
        width: 100%;
        height: 50px;
        margin-top: 10px;
        border: 1px solid #34343a;
        border-radius: 0;
        background: #0071bb;
        color: #ffffff;
        cursor: pointer;
        font-family: var(--font-cn);
        font-size: 18px;
        font-weight: 300;
        transition: filter 140ms ease, transform 140ms ease;
      }

      .randomize-button:hover,
      .export-button:hover {
        filter: brightness(1.06);
      }

      .randomize-button:active,
      .export-button:active {
        transform: translateY(1px);
      }

      .export-dock {
        flex: 0 0 auto;
        padding: 12px;
        border-top: 1px solid #27272d;
        background: #0d0d11;
      }

      .export-button {
        display: grid;
        grid-template-columns: 30px 1fr;
        align-items: center;
        width: 100%;
        height: 62px;
        border: 0;
        border-radius: 0;
        background: var(--yellow);
        color: #08080a;
        cursor: pointer;
        transition: filter 140ms ease, transform 140ms ease;
      }

      .export-icon {
        display: grid;
        place-items: center;
        height: 100%;
      }

      .export-icon img {
        display: block;
        width: 16px;
        height: 21px;
      }

      .export-label {
        font-family: var(--font-mono);
        font-size: 30px;
        font-weight: 300;
        letter-spacing: -0.05em;
        text-align: center;
      }

      .mobile-export {
        display: none;
      }

      .main {
        position: relative;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        row-gap: 22px;
        min-width: 0;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
        padding: 34px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }

      .title {
        width: clamp(142px, 14vw, 188px);
        flex: 0 0 auto;
      }

      .title img {
        display: block;
        width: 100%;
        height: auto;
      }

      .note {
        max-width: 420px;
        color: #6d7078;
        font-family: var(--font-cn);
        font-size: 16px;
        line-height: 1.6;
      }

      .workspace {
        display: block;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        height: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        overflow: hidden;
        z-index: 1;
      }

      .result {
        display: block;
        width: var(--fit-width, auto);
        height: var(--fit-height, auto);
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        background: transparent;
      }

      .node-list {
        display: grid;
        gap: 10px;
      }

      .node {
        display: grid;
        grid-template-columns: 38px 1fr 42px;
        align-items: center;
        min-height: 62px;
        border: 1px solid #303036;
        background: #151519;
        color: var(--paper);
        cursor: pointer;
        transition: border-color 160ms ease, background 160ms ease;
      }

      .node.active {
        border-color: var(--yellow);
        background: #1d1d21;
      }

      .node.disabled {
        opacity: 0.38;
      }

      .node-index {
        display: grid;
        place-items: center;
        height: 100%;
        border-right: 1px solid #303036;
        color: var(--yellow);
        font-size: 20px;
      }

      .node-body {
        padding: 10px 12px;
      }

      .node-name {
        font-size: 19px;
      }

      .node-desc {
        margin-top: 4px;
        color: #9296a0;
        font-family: var(--font-cn);
        font-size: 13px;
        line-height: 1.4;
      }

      .toggle {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        margin: 0 auto;
        border: 1px solid #4d4d55;
        color: var(--muted);
        user-select: none;
      }

      .node:not(.disabled) .toggle {
        border-color: var(--yellow);
        color: var(--yellow);
      }

      .param-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 16px;
      }

      .param-title strong {
        font-size: 24px;
        font-weight: 300;
      }

      .param-title span {
        color: #969aa4;
        font-family: var(--font-cn);
        font-size: 14px;
      }

      .control {
        position: relative;
        margin-bottom: 18px;
      }

      .label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        color: #c5c8d0;
        font-family: var(--font-cn);
        font-size: 16px;
      }

      input[type="range"] {
        width: 100%;
        height: 18px;
        appearance: none;
        background: transparent;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        background: linear-gradient(90deg, var(--yellow) var(--pct, 50%), #555 var(--pct, 50%));
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        margin-top: -7px;
        border: 0;
        border-radius: 5px;
        background: #fff;
      }

      .color-control {
        position: relative;
      }

      .color-summary {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 14px;
        align-items: center;
        min-height: 64px;
      }

      .color-swatch {
        width: 54px;
        height: 54px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0;
        background: rgb(var(--rgb, 255, 255, 255));
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
        cursor: pointer;
      }

      .color-swatch:hover {
        border-color: var(--yellow);
      }

      .color-meta {
        min-width: 0;
      }

      .color-hex-readout {
        color: #f4f3ef;
        font-size: 20px;
        line-height: 1.1;
      }

      .color-kind {
        margin-top: 4px;
        color: #8e929c;
        font-family: var(--font-cn);
        font-size: 14px;
      }

      .color-popover {
        position: fixed;
        left: var(--popover-left, 24px);
        top: var(--popover-top, 24px);
        z-index: 80;
        width: min(330px, calc(100vw - 24px));
        margin-top: 0;
        padding: 12px;
        border: 1px solid #3d3d44;
        background: #0d0d11;
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.44);
        animation: color-pop 120ms ease-out;
      }

      @keyframes color-pop {
        from {
          opacity: 0;
          transform: translateX(8px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .sv-picker {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 0.72;
        border: 1px solid #4b4b50;
        border-radius: 0;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(to top, #000, transparent),
          linear-gradient(to right, #fff, hsl(var(--hue, 0), 100%, 50%));
      }

      .sv-handle {
        position: absolute;
        left: calc(var(--sat, 1) * 100%);
        top: calc((1 - var(--val, 1)) * 100%);
        width: 18px;
        height: 18px;
        border: 3px solid #fff;
        border-radius: 50%;
        background: transparent;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.42), 0 2px 8px rgba(0, 0, 0, 0.35);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .hue-slider {
        display: block;
        width: 100%;
        height: 38px;
        margin-top: 14px;
        appearance: none;
        background: transparent;
      }

      .color-popover .hue-slider::-webkit-slider-runnable-track {
        height: 22px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: linear-gradient(90deg, #f00 0%, #ff0 16.66%, #0f0 33.33%, #0ff 50%, #00f 66.66%, #f0f 83.33%, #f00 100%);
      }

      .color-popover .hue-slider::-webkit-slider-thumb {
        appearance: none;
        width: 30px;
        height: 30px;
        margin-top: -5px;
        border: 5px solid #fff;
        border-radius: 50%;
        background: hsl(var(--hue, 0), 100%, 50%);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.24);
      }

      .color-fields {
        display: grid;
        grid-template-columns: 34px 1fr;
        align-items: center;
        margin-top: 12px;
        border: 1px solid #303036;
        background: #17171b;
      }

      .hex-prefix {
        display: grid;
        place-items: center;
        height: 44px;
        border-right: 1px solid #303036;
        color: #777b85;
        font-family: var(--font-mono);
        font-size: 18px;
        line-height: 1;
      }

      .hex,
      .check {
        width: 100%;
        height: 40px;
        border: 1px solid #4b4b50;
        border-radius: 0;
        padding: 0 10px;
        background: #17171b;
        color: #fff;
      }

      .color-popover .hex {
        height: 44px;
        border: 0;
        background: #17171b;
        color: #f4f3ef;
        font-family: var(--font-mono);
        font-size: 18px;
        text-transform: uppercase;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #c5c8d0;
        font-family: var(--font-cn);
        font-size: 15px;
      }

      .hidden {
        display: none !important;
      }

      /* Figma 1797:55 desktop composition */
      .app {
        grid-template-columns: 360px minmax(0, 1fr) 360px;
      }

      .side,
      .right {
        background: #27272a;
      }

      .side {
        border-right: 0;
      }

      .right {
        position: relative;
        border-left: 1px solid #27272d;
      }

      .brand {
        min-height: 140px;
        padding: 30px;
        border-bottom: 0;
        background: #252528;
      }

      .brand img {
        width: 300px;
      }

      .panel {
        padding: 25px 28px 24px;
        border-bottom: 0;
      }

      h2 {
        margin-bottom: 19px;
        color: #9c9ca2;
        font-size: 20px;
        line-height: 22px;
        font-weight: 300;
      }

      .drop {
        position: relative;
        width: 300px;
        height: 88px;
        border: 0;
        background: #0095dd;
        color: #e5e5e5;
        box-shadow: none;
        overflow: visible;
        flex: 0 0 auto;
      }

      .drop::after {
        content: none;
      }

      .drop::before {
        content: none;
      }

      .drop:hover,
      .drop.drag {
        background: #08a2ea;
      }

      .drop-content {
        position: relative;
        padding: 0;
        height: 100%;
        transform: none;
        pointer-events: none;
      }

      .drop-title {
        position: absolute;
        left: 76px;
        top: 17px;
        width: 148px;
        height: 54px;
        padding-left: 0;
        font-size: 40px;
        line-height: 54px;
        font-weight: 200;
        letter-spacing: -2px;
        text-align: center;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .input-icon {
        position: absolute;
        left: 25px;
        top: 29px;
        transform: none;
        width: 30px;
        height: 30px;
        object-fit: contain;
      }

      .input-arrow {
        position: absolute;
        left: 263px;
        top: 34px;
        right: auto;
        transform: none;
        width: 16px;
        height: 20px;
        object-fit: contain;
      }

      .drop-sub {
        display: flex;
        align-items: baseline;
        width: 300px;
        margin-top: 23px;
        padding-left: 17px;
        color: #e5e5e5;
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 300;
        line-height: 19px;
        letter-spacing: -0.75px;
        text-align: left;
        white-space: nowrap;
      }

      #inputStatus.drop-sub {
        overflow: visible;
      }

      .drop-sub span {
        display: inline-block;
        flex: 0 0 12px;
        width: 12px;
        margin-right: 13px;
        color: var(--yellow);
        font-size: 20px;
        font-weight: 500;
        line-height: 19px;
        vertical-align: -3px;
      }

      .side-previews {
        grid-template-columns: 146px 146px;
        gap: 11px;
        margin-top: 45px;
      }

      .side-preview {
        grid-template-rows: 35px 101px;
        border: 0;
        background: #202024;
      }

      .side-preview h3 {
        padding: 10px 10px 0;
        border-bottom: 0;
        color: #a7a7ad;
        font-size: 19px;
      }

      .side-preview canvas {
        height: 101px;
        background: #202024;
      }

      .preset-grid {
        gap: 8px 7px;
      }

      .preset {
        min-height: 59px;
        padding: 8px 12px;
        background: #202024;
        color: #c7c7ca;
        font-size: 16px;
      }

      .preset:hover {
        background: #29292d;
      }

      .preset.active {
        outline: 1px solid #079bda;
        outline-offset: -1px;
        background: #202024;
        color: #d7d7da;
      }

      .preset small {
        margin-top: 5px;
        font-size: 13px;
        line-height: 17.55px;
      }

      .randomize-button {
        width: 304px;
        height: 60px;
        margin-top: 10px;
        border: 1px solid #000;
        background: #222227;
        color: #f4f3ef;
        font-family: var(--font-mono);
        font-size: 30px;
        line-height: 39px;
        font-weight: 300;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }

      .powered-by {
        min-height: 152px;
        margin-top: 320px;
        padding: 36px 30px 28px;
        background: #565659;
        color: #252528;
      }

      .powered-by span,
      .powered-by strong {
        display: block;
        font-family: var(--font-cn);
      }

      .powered-by span {
        font-size: 26px;
        line-height: 30px;
        font-weight: 400;
        letter-spacing: -0.04em;
      }

      .powered-by strong {
        margin-top: 2px;
        font-size: 55px;
        line-height: 56px;
        font-weight: 800;
        letter-spacing: -0.055em;
      }

      .main {
        padding: 30px 38px 24px;
      }

      .top {
        align-items: flex-start;
      }

      .title {
        width: 364px;
        flex: 0 0 364px;
      }

      .title img {
        width: 364px;
        height: 110px;
        object-fit: contain;
        object-position: left top;
      }

      .note {
        width: 416px;
        max-width: 416px;
        margin-top: 45px;
        color: #8e8e93;
        font-size: 15px;
        line-height: 1.52;
      }

      .right-scroll {
        padding-bottom: 4px;
      }

      .node-list {
        gap: 10px;
      }

      .node {
        grid-template-columns: 39px 1fr 36px;
        min-height: 68px;
        border: 1px solid transparent;
        background: #202024;
      }

      .node.active {
        outline: 1px solid var(--yellow);
        outline-offset: -1px;
        background: #202024;
      }

      .node.disabled {
        opacity: 0.38;
      }

      .node-index {
        border-right: 1px solid #303036;
        color: #b6b6bc;
        font-size: 20px;
      }

      .node-body {
        padding: 10px 12px;
      }

      .node-name {
        font-size: 19px;
        line-height: 24px;
      }

      .node-desc {

      const work = document.getElementById("work");
      const workCtx = work.getContext("2d", { willReadFrequently: true });
      const result = document.getElementById("result");
      const resultCtx = result.getContext("2d", { willReadFrequently: true });
      const sourceMini = document.getElementById("sourceMini");

      const maskMiniCtx = maskMini.getContext("2d", { willReadFrequently: true });
      const sidePreviews = document.getElementById("sidePreviews");
      const nodeList = document.getElementById("nodeList");
      const paramPanel = document.getElementById("paramPanel");
      const paramFlyout = document.getElementById("paramFlyout");
      const paramName = document.getElementById("paramName");
      const paramHint = document.getElementById("paramHint");
      const colorPanel = document.getElementById("colorPanel");
      const reverseToggle = document.getElementById("reverseToggle");
      const presetGrid = document.getElementById("presetGrid");
      let renderFrameQueued = false;
      let colorRenderTimer = 0;
      let colorOutsideHandlerBound = false;

      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }

      function clamp(value, min = 0, max = 255) {
        return Math.max(min, Math.min(max, value));
      }

      function scheduleRenderOutput() {
        if (renderFrameQueued) return;
        renderFrameQueued = true;
        requestAnimationFrame(() => {
          renderFrameQueued = false;
          renderOutput();
          syncResultFit();
        });
      }

      function scheduleColorRenderOutput() {
        if (colorRenderTimer) return;
        colorRenderTimer = window.setTimeout(() => {
          colorRenderTimer = 0;
          scheduleRenderOutput();
        }, 48);
      }

      function flushColorRenderOutput() {
        if (colorRenderTimer) {
          window.clearTimeout(colorRenderTimer);
          colorRenderTimer = 0;
        }
        scheduleRenderOutput();
      }

      function isTransparentOutput() {
        const color = state.nodes.color;
        return Boolean(color.transparent) || getColorAlpha(color, "bg") <= 0;
      }

      function shouldClipDecorToMask() {
        return isTransparentOutput() || state.outputReverse;
      }

      function getTextureMask(outputMask) {
        return outputMask;
      }

      function syncResultFit() {
        const stage = result.parentElement;
        if (!stage) return;
        const stageW = stage.clientWidth;
        const stageH = stage.clientHeight;
        const canvasW = result.width || 1;
        const canvasH = result.height || 1;
        if (!stageW || !stageH || !canvasW || !canvasH) return;

        const scale = Math.min(stageW / canvasW, stageH / canvasH);
        const width = Math.max(1, Math.floor(canvasW * scale));
        const height = Math.max(1, Math.floor(canvasH * scale));
        result.style.setProperty("--fit-width", `${width}px`);
        result.style.setProperty("--fit-height", `${height}px`);
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function smoothstep(edge0, edge1, x) {
        const t = Math.max(0, Math.min(1, (x - edge0) / Math.max(0.0001, edge1 - edge0)));
        return t * t * (3 - 2 * t);
      }

      function hash(x, y, seed = 1) {
        const n = Math.sin(x * 127.1 + y * 311.7 + seed * 74.7) * 43758.5453123;
        return n - Math.floor(n);
      }

      function hexToRgb(hex) {
        const clean = String(hex || "").trim().replace("#", "");
        const full = clean.length === 3 ? clean.split("").map((x) => x + x).join("") : clean.padEnd(6, "0").slice(0, 6);
        const value = Number.parseInt(full, 16);
        if (!Number.isFinite(value)) return { r: 0, g: 0, b: 0 };
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
      }

      function rgbToHex({ r, g, b }) {
        return `#${[r, g, b].map((v) => Math.round(clamp(v)).toString(16).padStart(2, "0")).join("")}`;
      }

      function rgbToHsv({ r, g, b }) {
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const d = max - min;
        let h = 0;
        if (d !== 0) {
          if (max === r) h = ((g - b) / d) % 6;
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h *= 60;
          if (h < 0) h += 360;
        }
        return { h, s: max === 0 ? 0 : d / max, v: max };
      }

      function hsvToRgb({ h, s, v }) {
        const c = v * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = v - c;
        let r = 0;
        let g = 0;
        let b = 0;
        if (h < 60) [r, g, b] = [c, x, 0];
        else if (h < 120) [r, g, b] = [x, c, 0];
        else if (h < 180) [r, g, b] = [0, c, x];
        else if (h < 240) [r, g, b] = [0, x, c];
        else if (h < 300) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        return { r: (r + m) * 255, g: (g + m) * 255, b: (b + m) * 255 };
      }

      function getColorAlpha(node, key) {
        return Number.isFinite(node[`${key}Alpha`]) ? node[`${key}Alpha`] : 100;
      }

      function drawContain(ctx, media, aspect, w, h, fill = "#fff") {
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fillRect(0, 0, w, h);
        }
        let dw = w;
        let dh = h;
        if (w / h > aspect) dw = h * aspect;
        else dh = w / aspect;
        ctx.drawImage(media, (w - dw) / 2, (h - dh) / 2, dw, dh);
      }

      function drawTransparencyGrid(ctx, w, h) {
        const cell = 16;
        ctx.fillStyle = "#d9d9d9";
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#eeeeee";
        for (let y = 0; y < h; y += cell) {
          for (let x = 0; x < w; x += cell) {
            if ((x / cell + y / cell) % 2 === 0) ctx.fillRect(x, y, cell, cell);
          }
        }
      }

      function sourceHasTransparency(media, aspect) {
        const maxSide = 96;
        const canvas = document.createElement("canvas");
        if (aspect >= 1) {
          canvas.width = maxSide;
          canvas.height = Math.max(1, Math.round(maxSide / aspect));
        } else {
          canvas.height = maxSide;
          canvas.width = Math.max(1, Math.round(maxSide * aspect));
        }
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(media, 0, 0, canvas.width, canvas.height);
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        for (let i = 3; i < pixels.length; i += 4) {
          if (pixels[i] < 250) return true;
        }
        return false;
      }

      function getLuma(data, index) {
        return data[index] * 0.299 + data[index + 1] * 0.587 + data[index + 2] * 0.114;
      }

      function updateRangeStyle(input) {
        const min = Number(input.min);
        const max = Number(input.max);
        const value = Number(input.value);
        input.style.setProperty("--pct", `${((value - min) / (max - min)) * 100}%`);
      }

      function setPreset(id) {
        state.preset = id;

      function randInt(min, max) {

      }

      }

      function pick(list) {

      }

      function randomColorValue(role) {
        const backgrounds = ["#f7f6f2", "#f2eee5", "#d9d9d9", "#c8d8cb", "#111116", "#0c0d11"];

      }

      const presetRandomProfiles = {
        thermalMap: {
          ranges: {
            extract: { threshold: [92, 144], contrast: [28, 68], grayKeep: [0, 22] },

            edge: { width: [1, 5], rough: [18, 56] },
            distress: { amount: [10, 30], size: [3, 7], seed: [1, 99] },
            texture: { fabric: [12, 42], scan: [8, 34], bleed: [6, 24] },
            decor: { grid: [6, 34], gridSize: [30, 72], blur: [48, 86], particles: [4, 30] },
          },
          backgrounds: ["#f7f6f2", "#f2eee5", "#dfe6df", "#d9d9d9", "#111116"],
          graphics: ["#050506", "#263b55", "#5a3b22", "#6fc7ba", "#ff682c"],
        },
        penTrace: {
          ranges: {

            ink: { strength: [78, 100], holes: [6, 26] },
            edge: { width: [1, 3], rough: [48, 90] },
            distress: { amount: [16, 44], size: [2, 6], seed: [1, 99] },

      function syncGraphicColor(value) {
        const clean = value.startsWith("#") ? value : `#${value}`;
        state.nodes.ink.color = clean;
        state.nodes.edge.color = clean;
        state.nodes.color.highlight = clean;
      }

      function getUiColorAlpha(nodeId, key) {
        if (nodeId === "ink" && key === "color") return getColorAlpha(state.nodes.ink, "color");
        return getColorAlpha(state.nodes[nodeId], key);
      }

      function setUiColorAlpha(nodeId, key, alpha) {
        const value = clamp(alpha, 0, 100);

          state.nodes.ink.colorAlpha = value;
          state.nodes.edge.colorAlpha = value;
          state.nodes.color.highlightAlpha = value;
          return;
        }
        state.nodes[nodeId][`${key}Alpha`] = value;
        if (nodeId === "color" && key === "bg") state.nodes.color.transparent = value <= 0;
      }

      function toggleUiColorAlpha(nodeId, key) {
        const alpha = getUiColorAlpha(nodeId, key);
        setUiColorAlpha(nodeId, key, alpha > 0 ? 0 : 100);
        renderAll();
      }

      function randomizeChain() {
        const preset = presets[state.preset];
        const profile = presetRandomProfiles[state.preset];
        state.nodes = clone(preset.nodes);
        state.outputReverse = chance(0.5);

        Object.entries(profile.ranges).forEach(([nodeId, ranges]) => {
          const node = state.nodes[nodeId];
          if (!node || !node.enabled) return;
          Object.entries(ranges).forEach(([key, range]) => {
            node[key] = randInt(range[0], range[1]);
          });
        });

        state.nodes.color.bg = pick(profile.backgrounds);
        syncGraphicColor(pick(profile.graphics));
        state.nodes.color.bgAlpha = 100;
        state.nodes.color.highlightAlpha = 100;
        state.nodes.ink.colorAlpha = 100;
        state.nodes.edge.colorAlpha = 100;
        state.nodes.color.transparent = false;
        state.selected = preset.selected;
        renderAll();

      function renderNodeList() {

          item.className = `node${state.flyoutOpen && state.selected === meta.id ? " active" : ""}${node.enabled ? "" : " disabled"}`;
          item.innerHTML = `

          item.addEventListener("click", () => {
            const isCurrentOpen = state.flyoutOpen && state.selected === meta.id;
            state.selected = meta.id;
            state.flyoutOpen = !isCurrentOpen;

      function positionParamFlyout() {
        const active = nodeList.querySelector(".node.active");

      function controlRange(label, key, min, max, step = 1) {

      function controlCheck(label, key) {

      function renderColorPanel() {

      function syncReverseToggle() {

      function setPickerVisual(picker) {
        const key = picker.dataset.colorParam;

        picker.style.setProperty("--sat", hsv.s);

        hex.value = cleanHex;

      function setColorFromHsv(picker, next) {
        const key = picker.dataset.colorParam;
        const nodeId = picker.dataset.colorNode || state.selected;
        const node = state.nodes[nodeId];
        const hsv = {
          h: Number(next.h ?? picker.dataset.h ?? 0),
          s: Number(next.s ?? picker.dataset.s ?? 1),
          v: Number(next.v ?? picker.dataset.v ?? 1),

        node[key] = rgbToHex(hsvToRgb(hsv));
        if (nodeId === "ink" && key === "color") syncGraphicColor(node[key]);

      function closeColorPopovers(except) {
        document.querySelectorAll("[data-color-popover]").forEach((item) => {
          if (item !== except) item.classList.add("hidden");

      function positionColorPopover(picker) {
        const popover = picker.querySelector("[data-color-popover]");
        const toggle = picker.querySelector("[data-color-toggle]");
        if (!popover || !toggle) return;

        const previousHidden = popover.classList.contains("hidden");
        if (previousHidden) popover.classList.remove("hidden");

        const gap = 12;
        const edge = 12;
        const toggleRect = toggle.getBoundingClientRect();
        const popRect = popover.getBoundingClientRect();
        const leftSpace = toggleRect.left - gap - edge;
        const rightSpace = window.innerWidth - toggleRect.right - gap - edge;
        const preferLeft = leftSpace >= Math.min(popRect.width, 260) || leftSpace >= rightSpace;
        let left = preferLeft ? toggleRect.left - popRect.width - gap : toggleRect.right + gap;
        let top = toggleRect.top + toggleRect.height * 0.5 - popRect.height * 0.5;

        left = clamp(left, edge, window.innerWidth - popRect.width - edge);
        top = clamp(top, edge, window.innerHeight - popRect.height - edge);
        popover.style.setProperty("--popover-left", `${left}px`);
        popover.style.setProperty("--popover-top", `${top}px`);

        if (previousHidden) popover.classList.add("hidden");
      }

      function attachColorPickers() {
        if (!colorOutsideHandlerBound) {
          document.addEventListener("click", () => closeColorPopovers());
          window.addEventListener("resize", () => closeColorPopovers());
          colorOutsideHandlerBound = true;
        }

        document.querySelectorAll("[data-color-param]").forEach((picker) => {
          const key = picker.dataset.colorParam;
          const nodeId = picker.dataset.colorNode || state.selected;
          setPickerVisual(picker);
          const toggle = picker.querySelector("[data-color-toggle]");
          const popover = picker.querySelector("[data-color-popover]");
          const sv = picker.querySelector(".sv-picker");
          const hue = picker.querySelector("[data-color-hue]");
          const hex = picker.querySelector("[data-color-hex]");
          const alpha = picker.querySelector("[data-alpha-toggle]");

          popover.addEventListener("click", (event) => event.stopPropagation());

          toggle.addEventListener("click", (event) => {
            event.stopPropagation();
            const shouldOpen = popover.classList.contains("hidden");
            closeColorPopovers(popover);
            if (shouldOpen) {
              positionColorPopover(picker);
              popover.classList.remove("hidden");
            } else {
              popover.classList.add("hidden");
            }
          });

          alpha.addEventListener("click", (event) => {
            event.stopPropagation();
            closeColorPopovers();
            toggleUiColorAlpha(nodeId, key);
          });

          const updateSv = (event) => {
            const rect = sv.getBoundingClientRect();
            const s = clamp((event.clientX - rect.left) / rect.width, 0, 1);
            const v = clamp(1 - (event.clientY - rect.top) / rect.height, 0, 1);
            setColorFromHsv(picker, { s, v });
          };

          sv.addEventListener("pointerdown", (event) => {
            sv.setPointerCapture(event.pointerId);
            updateSv(event);
          });
          sv.addEventListener("pointermove", (event) => {
            if (event.buttons) updateSv(event);
          });
          sv.addEventListener("pointerup", flushColorRenderOutput);
          hue.addEventListener("input", () => setColorFromHsv(picker, { h: Number(hue.value) }));
          hue.addEventListener("change", flushColorRenderOutput);
          hex.addEventListener("input", () => {
            const clean = hex.value.replace(/[^0-9a-fA-F]/g, "").slice(0, 6);
            hex.value = clean.toUpperCase();
            if (clean.length === 6 || clean.length === 3) {
              state.nodes[nodeId][key] = `#${clean}`;
              if (nodeId === "ink" && key === "color") syncGraphicColor(state.nodes[nodeId][key]);
              setPickerVisual(picker);
              scheduleColorRenderOutput();
            }
          });
          hex.addEventListener("change", flushColorRenderOutput);
        });
      }

      function buildSourceImage() {
        const maxSide = state.size;
        const aspect = Math.max(0.01, state.sourceAspect || 1);
        const width = aspect >= 1 ? maxSide : Math.max(1, Math.round(maxSide * aspect));
        const height = aspect >= 1 ? Math.max(1, Math.round(maxSide / aspect)) : maxSide;
        work.width = width;
        work.height = height;
        workCtx.clearRect(0, 0, width, height);
        drawContain(workCtx, state.source, aspect, width, height, state.sourceHasTransparency ? null : "#ffffff");

        const miniMax = 320;
        const miniWidth = aspect >= 1 ? miniMax : Math.max(1, Math.round(miniMax * aspect));
        const miniHeight = aspect >= 1 ? Math.max(1, Math.round(miniMax / aspect)) : miniMax;
        sourceMini.width = miniWidth;
        sourceMini.height = miniHeight;
        sourceMiniCtx.clearRect(0, 0, miniWidth, miniHeight);
        if (state.sourceHasTransparency) {
          drawTransparencyGrid(sourceMiniCtx, miniWidth, miniHeight);
          drawContain(sourceMiniCtx, state.source, aspect, miniWidth, miniHeight, null);
        } else {
          drawContain(sourceMiniCtx, state.source, aspect, miniWidth, miniHeight, "#ffffff");
        }
        return workCtx.getImageData(0, 0, width, height);
      }

      function createMask(source) {
        const { data, width: w, height: h } = source;
        const extract = state.nodes.extract;
        const mask = new Float32Array(w * h);
        const contrast = 1 + (extract.enabled ? extract.contrast : 20) / 32;
        const threshold = extract.enabled ? extract.threshold : 128;
        const grayKeep = extract.enabled ? clamp(extract.grayKeep || 0, 0, 100) / 100 : 0;
        const softWidth = grayKeep * Math.min(132, 255 - threshold);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const i = (y * w + x) * 4;
            const alpha = data[i + 3] / 255;
            if (state.sourceHasTransparency) {
              mask[y * w + x] = alpha;
              continue;
            }
            let luma = clamp((getLuma(data, i) - 128) * contrast + 128);
            if (extract.invert) luma = 255 - luma;
            const noisy = luma + (hash(Math.floor(x / 3), Math.floor(y / 3), 2) - 0.5) * 22;
            if (grayKeep <= 0) {
              mask[y * w + x] = noisy < threshold ? 1 : 0;
            } else {
              mask[y * w + x] = clamp(1 - smoothstep(threshold, threshold + Math.max(1, softWidth), noisy), 0, 1);
            }
          }
        }
        return mask;
      }

      function edgeAt(mask, x, y, w, h, radius) {
        const c = mask[y * w + x] > 0.08 ? 1 : 0;
        for (let oy = -radius; oy <= radius; oy++) {
          for (let ox = -radius; ox <= radius; ox++) {
            const xx = Math.max(0, Math.min(w - 1, x + ox));
            const yy = Math.max(0, Math.min(h - 1, y + oy));
            if ((mask[yy * w + xx] > 0.08 ? 1 : 0) !== c) return 1;
          }
        }
        return 0;
      }

      function createRoughEdgeMask(mask, w, h, edge) {
        if (!edge.enabled || edge.rough <= 0 || edge.width <= 0) return mask;

        const rough = edge.rough / 100;
        const radius = Math.max(1, Math.min(8, Math.round(edge.width + 1 + rough * 4)));
        const cell = Math.max(2, Math.round(9 - rough * 6));
        const out = new Float32Array(mask);

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const p = y * w + x;
            if (!edgeAt(mask, x, y, w, h, radius)) continue;

            const base = mask[p] > 0.08 ? 1 : 0;
            const warpX = Math.floor((x + (hash(y, 17, 44) - 0.5) * cell) / cell);
            const warpY = Math.floor((y + (hash(x, 19, 45) - 0.5) * cell) / cell);
            const coarse = hash(warpX, warpY, 61);
            const band = hash(Math.floor(x / (cell * 2)), Math.floor(y / (cell * 2)), 62);
            const fine = hash(x, y, 63);
            const noise = coarse * 0.58 + band * 0.24 + fine * 0.18;

            if (base) {
              const chip = rough * (0.22 + edge.width * 0.018);
              if (noise < chip || fine < rough * 0.035) out[p] = 0;
            } else {
              const fuzz = rough * (0.18 + edge.width * 0.014);
              if (noise > 1 - fuzz || fine > 1 - rough * 0.02) out[p] = Math.max(out[p], 1);
            }
          }
        }

        return out;
      }

      function analyzeMaskGeometry(mask, w, h) {
        const bbox = { minX: w, minY: h, maxX: 0, maxY: 0, cx: w * 0.5, cy: h * 0.5 };
        const points = [];
        const step = Math.max(6, Math.round(Math.min(w, h) / 130));
        for (let y = step; y < h - step; y += step) {
          for (let x = step; x < w - step; x += step) {
            const p = y * w + x;
            if (mask[p]) {
              bbox.minX = Math.min(bbox.minX, x);
              bbox.minY = Math.min(bbox.minY, y);
              bbox.maxX = Math.max(bbox.maxX, x);
              bbox.maxY = Math.max(bbox.maxY, y);
            }
            if (edgeAt(mask, x, y, w, h, 2)) {
              const left = mask[y * w + Math.max(0, x - 4)];
              const right = mask[y * w + Math.min(w - 1, x + 4)];
              const up = mask[Math.max(0, y - 4) * w + x];
              const down = mask[Math.min(h - 1, y + 4) * w + x];
              let nx = right - left;
              let ny = down - up;
              const nl = Math.hypot(nx, ny) || 1;
              nx /= nl;
              ny /= nl;
              points.push({ x, y, nx, ny, tx: -ny, ty: nx });
            }
          }
        }
        if (bbox.minX >= bbox.maxX || bbox.minY >= bbox.maxY) {
          bbox.minX = w * 0.24;
          bbox.maxX = w * 0.76;
          bbox.minY = h * 0.24;
          bbox.maxY = h * 0.76;
        }
        bbox.cx = (bbox.minX + bbox.maxX) * 0.5;
        bbox.cy = (bbox.minY + bbox.maxY) * 0.5;
        bbox.width = bbox.maxX - bbox.minX;
        bbox.height = bbox.maxY - bbox.minY;
        return { bbox, points };
      }

      function renderMaskMini(mask, w, h) {
        const aspect = w / Math.max(1, h);
        const miniMax = 320;
        const miniWidth = aspect >= 1 ? miniMax : Math.max(1, Math.round(miniMax * aspect));
        const miniHeight = aspect >= 1 ? Math.max(1, Math.round(miniMax / aspect)) : miniMax;
        maskMini.width = miniWidth;
        maskMini.height = miniHeight;
        const image = maskMiniCtx.createImageData(miniWidth, miniHeight);
        const d = image.data;
        for (let y = 0; y < miniHeight; y++) {
          for (let x = 0; x < miniWidth; x++) {
            const sx = Math.min(w - 1, Math.floor((x / miniWidth) * w));
            const sy = Math.min(h - 1, Math.floor((y / miniHeight) * h));
            const strength = clamp(mask[sy * w + sx], 0, 1);
            const v = 242 - strength * 224;
            const i = (y * miniWidth + x) * 4;
            d[i] = v;
            d[i + 1] = v;
            d[i + 2] = v;
            d[i + 3] = 255;
          }
        }
        maskMiniCtx.putImageData(image, 0, 0);
      }

      function lumaAt(data, w, h, x, y) {
        const xx = Math.max(0, Math.min(w - 1, x));
        const yy = Math.max(0, Math.min(h - 1, y));
        return getLuma(data, (yy * w + xx) * 4);
      }

      function crossesLumaLevel(data, w, h, x, y, level) {
        const c = lumaAt(data, w, h, x, y) - level;
        const r = lumaAt(data, w, h, x + 1, y) - level;
        const d = lumaAt(data, w, h, x, y + 1) - level;
        return c * r <= 0 || c * d <= 0;
      }

      function applyPenTraceDetails(source, mask, w, h) {
        const { points } = analyzeMaskGeometry(mask, w, h);
        if (!points.length) return;
        const ink = state.nodes.ink;
        const edge = state.nodes.edge;
        const distress = state.nodes.distress;
        const texture = state.nodes.texture;
        const inkAlpha = getColorAlpha(ink, "color") / 100;
        const distressAmount = distress.enabled ? distress.amount : 0;
        const textureFabric = texture.enabled ? texture.fabric : 0;
        const count = Math.min(points.length, Math.round(90 + edge.rough * 4.6 + distressAmount * 2.4));

        resultCtx.save();
        resultCtx.strokeStyle = ink.color;
        resultCtx.fillStyle = ink.color;
        resultCtx.lineWidth = 0.65 + Math.max(0, edge.width) * 0.22;
        resultCtx.globalAlpha = 0.22 + inkAlpha * 0.42;
        resultCtx.lineCap = "round";

        for (let i = 0; i < count; i++) {
          const p = points[Math.floor(hash(i, distress.seed, 51) * points.length)];
          const srcIndex = (Math.round(p.y) * w + Math.round(p.x)) * 4;
          const tone = clamp((255 - getLuma(source.data, srcIndex)) / 255, 0, 1);
          if (distress.enabled && hash(i, 2, distress.seed) < distressAmount / 260) continue;
          const len = 4 + hash(i, 3, distress.seed) * (12 + textureFabric * 0.18);
          const jitter = (hash(i, 4, distress.seed) - 0.5) * 5;
          const offset = (hash(i, 5, distress.seed) - 0.5) * (5 + tone * 8);
          const x = p.x + p.nx * offset;
          const y = p.y + p.ny * offset;
          resultCtx.globalAlpha = 0.08 + inkAlpha * (0.16 + tone * 0.42);
          resultCtx.beginPath();
          resultCtx.moveTo(x - p.tx * len * 0.5 + p.nx * jitter, y - p.ty * len * 0.5 + p.ny * jitter);
          resultCtx.lineTo(x + p.tx * len * 0.5 - p.nx * jitter, y + p.ty * len * 0.5 - p.ny * jitter);
          resultCtx.stroke();

          if (distress.enabled && hash(i, 6, distress.seed) > 0.72) {
            resultCtx.globalAlpha = 0.12 + tone * 0.28;
            resultCtx.beginPath();
            resultCtx.arc(x + p.nx * 3, y + p.ny * 3, 0.75 + hash(i, 7, distress.seed) * 1.4, 0, Math.PI * 2);
            resultCtx.fill();
          }
        }
        resultCtx.restore();
      }

      function renderPenTrace(source, mask, w, h, textureMask = mask) {
        const { data } = source;
        const out = resultCtx.createImageData(w, h);
        const d = out.data;
        const extract = state.nodes.extract;
        const ink = state.nodes.ink;
        const edge = state.nodes.edge;
        const distress = state.nodes.distress;
        const texture = state.nodes.texture;
        const color = state.nodes.color;
        const inkRgb = hexToRgb(ink.color);
        const edgeRgb = hexToRgb(edge.color);
        const bgRgb = hexToRgb(color.bg);
        const inkAlpha = getColorAlpha(ink, "color") / 100;
        const bgAlpha = getColorAlpha(color, "bg") / 100;
        const transparent = isTransparentOutput();
        const clipDecor = shouldClipDecorToMask();
        const threshold = extract.threshold;
        const contrast = 1 + extract.contrast / 80;
        const levels = [threshold - 28, threshold, threshold + 34];
        const textureActive = texture.enabled;
        const distressActive = distress.enabled;

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const p = y * w + x;
            const i = p * 4;
            const raw = getLuma(data, i);
            const luma = clamp((raw - 128) * contrast + 128);
            const textureClip = clipDecor ? clamp(textureMask[p], 0, 1) : 1;
            const textureStrength = textureActive ? textureClip : 0;
            const paperNoise = transparent ? 0 : textureStrength * (hash(Math.floor(x / 3), Math.floor(y / 3), 81) - 0.5) * (8 + texture.fabric * 0.34);
            const scan = transparent ? 0 : textureStrength * Math.sin(y * 0.32 + hash(1, Math.floor(y / 4), 82) * 2) * texture.scan * 0.08;

            let r = transparent ? 0 : clamp(lerp(255, bgRgb.r, bgAlpha) + paperNoise + scan);
            let g = transparent ? 0 : clamp(lerp(255, bgRgb.g, bgAlpha) + paperNoise + scan);
            let b = transparent ? 0 : clamp(lerp(255, bgRgb.b, bgAlpha) + paperNoise + scan);
            let a = transparent ? 0 : 255;
            let line = 0;

            for (let levelIndex = 0; levelIndex < levels.length; levelIndex++) {
              const level = levels[levelIndex] + (hash(Math.floor(x / 5), Math.floor(y / 5), levelIndex + 84) - 0.5) * edge.rough * 0.42;
              if (crossesLumaLevel(data, w, h, x, y, level)) line = Math.max(line, levelIndex === 1 ? 1 : 0.62);
            }

            if (edge.enabled && edgeAt(mask, x, y, w, h, Math.max(1, Math.round(edge.width)))) {
              line = Math.max(line, 0.92);
            }

            const grainCell = Math.max(1, distress.size);
            const broken = distressActive && hash(Math.floor(x / grainCell), Math.floor(y / grainCell), distress.seed) < distress.amount / 360;
            const dot = distressActive && textureMask[p] && hash(x, y, distress.seed + 44) > 1 - ink.holes / 900;
            if (broken) line *= 0.18;
            if (dot) line = Math.max(line, 0.72);

            if (line > 0.05 && ink.enabled) {
              const scratch = 0.78 + hash(x, y, 91) * 0.32;
              const mix = clamp(line * ink.strength / 100 * inkAlpha * scratch, 0, 1);
              const lineR = lerp(inkRgb.r, edgeRgb.r, line * 0.35);
              const lineG = lerp(inkRgb.g, edgeRgb.g, line * 0.35);
              const lineB = lerp(inkRgb.b, edgeRgb.b, line * 0.35);
              r = transparent ? lineR : lerp(r, lineR, mix);
              g = transparent ? lineG : lerp(g, lineG, mix);
              b = transparent ? lineB : lerp(b, lineB, mix);
              a = transparent ? clamp(mix * 255) : 255;
            }

            d[i] = clamp(r);
            d[i + 1] = clamp(g);
            d[i + 2] = clamp(b);
            d[i + 3] = a;
          }
        }

        result.width = w;
        result.height = h;
        resultCtx.putImageData(out, 0, 0);
        applyPenTraceDetails(source, textureMask, w, h);
        if (transparent) clipResultAlphaToMask(textureMask, w, h);
        syncResultFit();
      }

      function getBlurredMaskData(mask, w, h, blurPx) {
        const maskCanvas = document.createElement("canvas");
        const blurCanvas = document.createElement("canvas");
        maskCanvas.width = blurCanvas.width = w;
        maskCanvas.height = blurCanvas.height = h;
        const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });
        const blurCtx = blurCanvas.getContext("2d", { willReadFrequently: true });
        const image = maskCtx.createImageData(w, h);
        const d = image.data;
        for (let p = 0; p < mask.length; p++) {
          const i = p * 4;
          d[i] = 0;
          d[i + 1] = 0;
          d[i + 2] = 0;
          d[i + 3] = clamp(mask[p], 0, 1) * 255;
        }
        maskCtx.putImageData(image, 0, 0);
        blurCtx.filter = `blur(${Math.max(0, blurPx)}px)`;
        blurCtx.drawImage(maskCanvas, 0, 0);
        blurCtx.filter = "none";
        return blurCtx.getImageData(0, 0, w, h).data;
      }

      function alphaAt(data, w, h, x, y) {
        const xx = Math.max(0, Math.min(w - 1, x));
        const yy = Math.max(0, Math.min(h - 1, y));
        return data[(yy * w + xx) * 4 + 3] / 255;
      }

      function renderThermalMap(source, mask, w, h, textureMask = mask) {
        const { data } = source;
        const out = resultCtx.createImageData(w, h);
        const d = out.data;
        const ink = state.nodes.ink;
        const edge = state.nodes.edge;
        const texture = state.nodes.texture;
        const decor = state.nodes.decor;
        const color = state.nodes.color;
        const inkRgb = hexToRgb(ink.color);
        const edgeRgb = hexToRgb(edge.color);
        const bgRgb = hexToRgb(color.bg);
        const hiRgb = hexToRgb(color.highlight);
        const inkAlpha = getColorAlpha(ink, "color") / 100;
        const edgeAlpha = getColorAlpha(edge, "color") / 100;
        const bgAlpha = getColorAlpha(color, "bg") / 100;
        const hiAlpha = getColorAlpha(color, "highlight") / 100;
        const transparent = isTransparentOutput();
        const clipDecor = shouldClipDecorToMask();
        const textureActive = texture.enabled;
        const textureFabric = textureActive ? texture.fabric : 0;
        const textureScan = textureActive ? texture.scan : 0;
        const textureBleed = textureActive ? texture.bleed : 0;
        const decorActive = decor.enabled;
        const decorBlur = decorActive ? decor.blur : 0;
        const decorParticles = decorActive ? decor.particles : 0;
        const distress = state.nodes.distress;
        const distressActive = distress.enabled;
        const soft = getBlurredMaskData(mask, w, h, 8 + decorBlur * 0.28 + textureBleed * 0.08);
        const body = getBlurredMaskData(mask, w, h, 2 + edge.width * 1.6);
        const glow = getBlurredMaskData(mask, w, h, 18 + decorBlur * 0.42 + textureBleed * 0.16);

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const p = y * w + x;
            const i = p * 4;
            const luma = getLuma(data, i);
            const tone = clamp((255 - luma) / 255, 0, 1);
            const softA = alphaAt(soft, w, h, x, y);
            const bodyA = alphaAt(body, w, h, x, y);
            const glowA = alphaAt(glow, w, h, x, y);
            const sx1 = alphaAt(soft, w, h, x + 1, y);
            const sx0 = alphaAt(soft, w, h, x - 1, y);
            const sy1 = alphaAt(soft, w, h, x, y + 1);
            const sy0 = alphaAt(soft, w, h, x, y - 1);
            const fuzzyEdge = clamp((Math.abs(sx1 - sx0) + Math.abs(sy1 - sy0)) * (4 + edge.rough * 0.045), 0, 1);
            const textureClip = clipDecor ? clamp(textureMask[p], 0, 1) : 1;
            const textureStrength = textureActive ? textureClip : 0;
            const alphaGate = transparent ? clamp(textureMask[p], 0, 1) : 1;
            const paperNoise = transparent ? 0 : textureStrength * (hash(Math.floor(x / 2), Math.floor(y / 2), 121) - 0.5) * (4 + textureFabric * 0.75);
            const paperWeave = transparent ? 0 : textureStrength * (
              Math.sin(x * 0.11 + hash(Math.floor(y / 12), 12, 124) * 2) +
              Math.sin(y * 0.18 + hash(Math.floor(x / 12), 13, 125) * 2)
            ) * textureFabric * 0.14;
            const materialArea = Math.max(softA, bodyA, fuzzyEdge);
            const materialNoise = textureStrength * materialArea * (hash(x, y, 122) - 0.5) * (textureFabric * 0.82 + decorParticles * 0.12);
            const distressCell = Math.max(1, distress.size || 1);
            const distressAmount = distressActive ? distress.amount / 100 : 0;
            const grain = distressActive ? hash(Math.floor(x / distressCell), Math.floor(y / distressCell), distress.seed) : 1;
            const fineGrain = distressActive ? hash(x, y, distress.seed + 127) : 1;
            const coarseDrop = distressActive && grain < distressAmount * 0.52;
            const pixelDrop = distressActive && fineGrain < distressAmount * 0.085;
            const distressDrop = coarseDrop ? 0.18 : pixelDrop ? 0.56 : 1;
            const distressNoise = distressActive
              ? (hash(Math.floor(x / 2), Math.floor(y / 2), distress.seed + 151) - 0.5) * (10 + distress.amount * 1.25) * Math.max(softA, bodyA)
              : 0;

            let r = transparent ? 0 : clamp(lerp(255, bgRgb.r, bgAlpha) + paperNoise + paperWeave);
            let g = transparent ? 0 : clamp(lerp(255, bgRgb.g, bgAlpha) + paperNoise + paperWeave);
            let b = transparent ? 0 : clamp(lerp(255, bgRgb.b, bgAlpha) + paperNoise + paperWeave);

            const haloMix = clamp((glowA - softA * 0.3) * 0.62 * hiAlpha * (0.88 + distressDrop * 0.12), 0, 0.72);
            r = transparent && haloMix > 0 ? hiRgb.r : lerp(r, hiRgb.r, haloMix);
            g = transparent && haloMix > 0 ? hiRgb.g : lerp(g, hiRgb.g, haloMix);
            b = transparent && haloMix > 0 ? hiRgb.b : lerp(b, hiRgb.b, haloMix);

            const bodyMix = clamp((softA * 0.38 + bodyA * 0.52) * (0.42 + tone * 0.58) * ink.strength / 100 * inkAlpha * distressDrop, 0, 0.96);
            r = transparent && bodyMix > 0 ? inkRgb.r : lerp(r, inkRgb.r, bodyMix);
            g = transparent && bodyMix > 0 ? inkRgb.g : lerp(g, inkRgb.g, bodyMix);
            b = transparent && bodyMix > 0 ? inkRgb.b : lerp(b, inkRgb.b, bodyMix);

            const edgeMix = clamp(fuzzyEdge * (0.26 + edge.width * 0.08) * edgeAlpha, 0, 0.58);
            r = lerp(r, edgeRgb.r, edgeMix);
            g = lerp(g, edgeRgb.g, edgeMix);
            b = lerp(b, edgeRgb.b, edgeMix);

            const paintedArea = Math.max(haloMix, bodyMix, edgeMix);
            const scan = textureStrength * (transparent ? paintedArea : 1) * Math.sin(y * 0.34 + hash(1, Math.floor(y / 5), 123) * 2) * textureScan * 0.12;
            d[i] = clamp(r + materialNoise + scan + distressNoise);
            d[i + 1] = clamp(g + materialNoise + scan + distressNoise);
            d[i + 2] = clamp(b + materialNoise + scan + distressNoise);
            d[i + 3] = transparent ? clamp(Math.max(haloMix, bodyMix, edgeMix) * alphaGate * 255) : 255;
          }
        }

        result.width = w;
        result.height = h;
        resultCtx.putImageData(out, 0, 0);
        if (decor.enabled && decor.grid > 0) {
          resultCtx.save();
          resultCtx.globalAlpha = decor.grid / 100 * 0.12;
          resultCtx.strokeStyle = "#111111";
          resultCtx.lineWidth = 1;
          const step = Math.max(12, Number(decor.gridSize) || 48);
          drawGrid(resultCtx, textureMask, w, h, step, clipDecor);
          resultCtx.restore();
        }
        if (transparent) clipResultAlphaToMask(textureMask, w, h);
        syncResultFit();
      }

      function drawGrid(ctx, mask, w, h, step, clipToMask) {
        if (!clipToMask) {
          for (let gx = step; gx < w; gx += step) {
            ctx.beginPath();
            ctx.moveTo(gx, 0);
            ctx.lineTo(gx, h);
            ctx.stroke();
          }
          for (let gy = step; gy < h; gy += step) {
            ctx.beginPath();
            ctx.moveTo(0, gy);
            ctx.lineTo(w, gy);
            ctx.stroke();
          }
          return;
        }

        const threshold = 0.05;
        const segment = 4;
        for (let gx = step; gx < w; gx += step) {
          let start = null;
          for (let y = 0; y < h; y += segment) {
            const inside = mask[Math.min(h - 1, y) * w + gx] > threshold;
            if (inside && start === null) start = y;
            if ((!inside || y >= h - segment) && start !== null) {
              const end = inside ? y : y - segment;
              if (end > start) {
                ctx.beginPath();
                ctx.moveTo(gx, start);
                ctx.lineTo(gx, end);
                ctx.stroke();
              }
              start = null;
            }
          }
        }
        for (let gy = step; gy < h; gy += step) {
          let start = null;
          for (let x = 0; x < w; x += segment) {
            const inside = mask[gy * w + Math.min(w - 1, x)] > threshold;
            if (inside && start === null) start = x;
            if ((!inside || x >= w - segment) && start !== null) {
              const end = inside ? x : x - segment;
              if (end > start) {
                ctx.beginPath();
                ctx.moveTo(start, gy);
                ctx.lineTo(end, gy);
                ctx.stroke();
              }
              start = null;
            }
          }
        }
      }

      function applyGraphicDecor(source, mask, w, h, clipToMask = false) {
        const decor = state.nodes.decor;
        if (!decor.enabled) return;

        resultCtx.save();
        if (decor.blur > 0) {
          const blurImage = workCtx.createImageData(w, h);
          const bd = blurImage.data;
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const p = y * w + x;
              const i = p * 4;
              const src = p * 4;
              const luma = getLuma(source.data, src);
              const strength = clamp(mask[p], 0, 1);
              const alpha = strength > 0.03 ? (0.12 + (255 - luma) / 255 * 0.34) * decor.blur * 2.1 * strength : 0;
              bd[i] = 10;
              bd[i + 1] = 10;
              bd[i + 2] = 10;
              bd[i + 3] = clamp(alpha);
            }
          }
          workCtx.putImageData(blurImage, 0, 0);
          resultCtx.globalAlpha = 0.8;
          resultCtx.filter = `blur(${Math.max(2, decor.blur * 0.32)}px)`;
          resultCtx.drawImage(work, 0, 0);
          resultCtx.filter = "none";
        }

        if (decor.grid > 0) {
          const gridAlpha = decor.grid / 100;
          resultCtx.globalAlpha = gridAlpha * 0.42;
          resultCtx.strokeStyle = "#111111";
          resultCtx.lineWidth = 1;
          const step = Math.max(12, Number(decor.gridSize) || 48);
          drawGrid(resultCtx, mask, w, h, step, clipToMask);
        }

        if (decor.particles > 0) {
          resultCtx.globalAlpha = 0.55;
          resultCtx.fillStyle = "#111111";
          const count = Math.floor(decor.particles * 8);
          for (let i = 0; i < count; i++) {
            const x = Math.floor(hash(i, 1, 91) * w);
            const y = Math.floor(hash(i, 2, 91) * h);
            const p = y * w + x;
            const nearMask = clipToMask
              ? mask[p] > 0.08
              : mask[p] > 0.08 || hash(Math.floor(x / 28), Math.floor(y / 28), 93) > 0.72;
            if (!nearMask) continue;
            const s = 1 + hash(i, 3, 91) * 2.8;
            resultCtx.beginPath();
            resultCtx.arc(x, y, s, 0, Math.PI * 2);
            resultCtx.fill();
          }
        }
        resultCtx.restore();
      }

      function clipResultAlphaToMask(mask, w, h) {
        const image = resultCtx.getImageData(0, 0, w, h);
        const d = image.data;
        for (let p = 0; p < mask.length; p++) {
          const i = p * 4;
          d[i + 3] = Math.min(d[i + 3], clamp(mask[p], 0, 1) * 255);
        }
        resultCtx.putImageData(image, 0, 0);
      }

      function applyOutputReverseMask(mask) {
        if (!state.outputReverse) return mask;
        const reversed = new Float32Array(mask.length);
        for (let i = 0; i < mask.length; i++) {
          reversed[i] = 1 - clamp(mask[i], 0, 1);
        }
        return reversed;
      }

      function renderOutput() {
        if (!state.source) return;
        const source = buildSourceImage();
        const { data, width: w, height: h } = source;
        const baseMask = createMask(source);
        const roughMask = createRoughEdgeMask(baseMask, w, h, state.nodes.edge);
        const outputMask = applyOutputReverseMask(roughMask);
        const textureMask = getTextureMask(outputMask);
        renderMaskMini(outputMask, w, h);
        if (state.preset === "penTrace") {
          renderPenTrace(source, outputMask, w, h, textureMask);
          return;
        }
        if (state.preset === "thermalMap") {
          renderThermalMap(source, outputMask, w, h, textureMask);
          return;
        }
        const out = resultCtx.createImageData(w, h);
        const d = out.data;

        const extract = state.nodes.extract;
        const ink = state.nodes.ink;
        const screen = state.nodes.screen;
        const edge = state.nodes.edge;
        const distress = state.nodes.distress;
        const texture = state.nodes.texture;
        const decor = state.nodes.decor;
        const color = state.nodes.color;
        const inkRgb = hexToRgb(ink.color);
        const edgeRgb = hexToRgb(edge.color);
        const bgRgb = hexToRgb(color.bg);
        const hiRgb = hexToRgb(color.highlight);
        const inkAlpha = getColorAlpha(ink, "color") / 100;
        const edgeAlpha = getColorAlpha(edge, "color") / 100;
        const bgAlpha = getColorAlpha(color, "bg") / 100;
        const hiAlpha = getColorAlpha(color, "highlight") / 100;
        const transparent = isTransparentOutput();
        const clipDecor = shouldClipDecorToMask();

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const p = y * w + x;
            const i = p * 4;
            const luma = getLuma(data, i);
            let m = outputMask[p];
            let maskStrength = clamp(m, 0, 1);
            const textureStrength = clipDecor ? clamp(textureMask[p], 0, 1) : 1;
            let e = 0;

            if (edge.enabled && edge.width > 0) {
              e = edgeAt(outputMask, x, y, w, h, Math.max(1, Math.round(edge.width)));
            }

            if (screen.enabled && maskStrength > 0.03 && screen.strength > 0) {
              const angle = screen.angle * Math.PI / 180;
              const cos = Math.cos(angle);
              const sin = Math.sin(angle);
              const cx = x - w * 0.5;
              const cy = y - h * 0.5;
              const rx = cx * cos - cy * sin;
              const ry = cx * sin + cy * cos;
              const cell = Math.max(3, screen.dot);
              const lx = ((rx % cell) + cell) % cell - cell * 0.5;
              const ly = ((ry % cell) + cell) % cell - cell * 0.5;
              const tone = clamp((255 - luma) / 255, 0, 1);
              const radius = cell * (0.12 + tone * 0.52) * (screen.strength / 100) * (0.72 + maskStrength * 0.28);
              if (Math.hypot(lx, ly) > radius) {
                m = 0;
                maskStrength = 0;
              }
            }

            if (distress.enabled && maskStrength > 0.03 && textureStrength > 0.03) {
              const cell = Math.max(1, distress.size);
              const speckle = hash(Math.floor(x / cell), Math.floor(y / cell), distress.seed);
              const fine = hash(x, y, distress.seed + 9);
              const holePower = distress.amount / 100;
              const sourceHole = ink.enabled ? ink.holes / 100 : 0;
              if (speckle < holePower * 0.18 || fine < sourceHole * 0.08) {
                m = 0;
                maskStrength = 0;
              }
            }

            let r = transparent ? 0 : bgRgb.r;
            let g = transparent ? 0 : bgRgb.g;
            let b = transparent ? 0 : bgRgb.b;
            let a = transparent ? 0 : 255;

            if (color.enabled && !transparent) {
              const fabric = texture.enabled ? texture.fabric / 100 : 0;
              const fabricNoise = textureStrength * (hash(Math.floor(x / 7), Math.floor(y / 3), 21) - 0.5) * fabric * 44;
              r = clamp(lerp(255, bgRgb.r, bgAlpha) + fabricNoise);
              g = clamp(lerp(255, bgRgb.g, bgAlpha) + fabricNoise);
              b = clamp(lerp(255, bgRgb.b, bgAlpha) + fabricNoise);
            }

            if (maskStrength > 0.03 && ink.enabled) {
              const strength = ink.strength / 100 * inkAlpha * maskStrength;
              const shade = clamp((255 - luma) / 255, 0, 1);
              const printNoise = textureStrength * (hash(x, y, 4) - 0.5) * 48 * (texture.enabled ? texture.fabric / 100 : 0);
              r = lerp(r, lerp(inkRgb.r, hiRgb.r, shade * 0.18 * hiAlpha), strength) + printNoise;
              g = lerp(g, lerp(inkRgb.g, hiRgb.g, shade * 0.18 * hiAlpha), strength) + printNoise;
              b = lerp(b, lerp(inkRgb.b, hiRgb.b, shade * 0.18 * hiAlpha), strength) + printNoise;
              a = 255;
            }

            if (e && edge.enabled) {
              const jag = hash(Math.floor(x / 3), Math.floor(y / 3), 13);
              const mix = (0.62 + jag * edge.rough / 180) * edgeAlpha;
              r = lerp(r, edgeRgb.r, mix);
              g = lerp(g, edgeRgb.g, mix);
              b = lerp(b, edgeRgb.b, mix);
              a = 255;
            }

            if (texture.enabled) {
              const scan = transparent && maskStrength <= 0.03 ? 0 : textureStrength * Math.sin(y * 0.42 + hash(1, Math.floor(y / 3), 5) * 2) * texture.scan * 0.12;
              const bleed = texture.bleed / 100;
              if (maskStrength > 0.03 && textureStrength > 0.03 && bleed > 0) {
                r = lerp(r, inkRgb.r, bleed * hash(x, y, 33) * 0.16 * maskStrength * textureStrength);
                g = lerp(g, inkRgb.g, bleed * hash(x, y, 34) * 0.16 * maskStrength * textureStrength);
                b = lerp(b, inkRgb.b, bleed * hash(x, y, 35) * 0.16 * maskStrength * textureStrength);
              }
              r = clamp(r + scan);
              g = clamp(g + scan);
              b = clamp(b + scan);
            }

            d[i] = clamp(r);
            d[i + 1] = clamp(g);
            d[i + 2] = clamp(b);
            d[i + 3] = a;
          }
        }

        result.width = w;
        result.height = h;
        resultCtx.putImageData(out, 0, 0);
        if (decor.enabled) applyGraphicDecor(source, textureMask, w, h, clipDecor);
        if (transparent) clipResultAlphaToMask(textureMask, w, h);
        syncResultFit();
      }

      function renderAll(shouldRenderOutput = true) {
        renderPresets();
        renderNodeList();
        renderColorPanel();
        renderParams();
        if (shouldRenderOutput) renderOutput();
        syncResultFit();
      }

      function setInputStatus(text) {
        inputStatus.replaceChildren();
        const mark = document.createElement("span");
        mark.textContent = "*";
        inputStatus.append(mark, document.createTextNode(` ${text}`));
      }

      function isSvgFile(file) {
        return file.type === "image/svg+xml" || /\.svg$/i.test(file.name);
      }

      function isPdfFile(file) {
        return file.type === "application/pdf" || /\.pdf$/i.test(file.name);
      }

      async function renderPdfFirstPage(file) {
        if (!window.pdfjsLib) throw new Error("PDF 渲染库没有加载成功");
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
        const page = await pdf.getPage(1);
        const baseViewport = page.getViewport({ scale: 1 });
        const maxSide = Math.max(baseViewport.width, baseViewport.height) || 1;
        const scale = Math.min(2.5, Math.max(1, 1600 / maxSide));
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport }).promise;
        return canvas;
      }

      function applyLoadedSource(source, aspect, type, status) {
        state.source = source;
        state.sourceType = type;
        state.sourceAspect = aspect || 1;
        state.sourceHasTransparency = type !== "pdf" && sourceHasTransparency(source, state.sourceAspect);
        sidePreviews.classList.remove("hidden");
        setInputStatus(state.sourceHasTransparency ? `${status} · 已识别透明轮廓` : status);
        renderAll();
      }

      async function loadFile(file) {
        if (!file) return;
        setInputStatus("正在读取文件...");

        try {
          if (isPdfFile(file)) {
            setInputStatus("正在读取 PDF 首页...");
            const pdfCanvas = await renderPdfFirstPage(file);
            applyLoadedSource(pdfCanvas, pdfCanvas.width / pdfCanvas.height, "pdf", "PDF 已载入：已使用第一页生成图形");
            return;
          }

          if (!file.type.startsWith("image/") && !isSvgFile(file)) {
            setInputStatus("格式不支持：请上传图片、SVG 或 PDF");
            return;
          }

          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            const type = isSvgFile(file) ? "svg" : "image";
            const label = type === "svg" ? "SVG 已载入" : "图片已载入";
            applyLoadedSource(img, img.naturalWidth / img.naturalHeight, type, `${label}：可继续拖入文件替换`);
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            setInputStatus("读取失败：这个文件无法作为图像处理");
          };
          img.src = url;
        } catch (error) {
          setInputStatus(`读取失败：${error.message}`);
        }
      }

      fileInput.addEventListener("change", (event) => loadFile(event.target.files[0]));
      drop.addEventListener("click", (event) => {
        if (event.target === fileInput) return;
        event.preventDefault();
        fileInput.click();
      });
      drop.addEventListener("dragover", (event) => {
        event.preventDefault();
        drop.classList.add("drag");
      });
      drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
      drop.addEventListener("drop", (event) => {
        event.preventDefault();
        drop.classList.remove("drag");
        loadFile(event.dataTransfer.files[0]);
      });
      function exportPng() {
        if (!state.source) return;
        const a = document.createElement("a");
        a.href = result.toDataURL("image/png");
        a.download = `graphic-texture-chain-${state.preset}.png`;
        a.click();
      }

      document.querySelectorAll("[data-export-png]").forEach((button) => {
        button.addEventListener("click", exportPng);
      });
      document.getElementById("randomize").addEventListener("click", () => {
        randomizeChain();
      });
  reverseToggle.addEventListener("click", () => {
    state.outputReverse = !state.outputReverse;
    syncReverseToggle();
    renderAll();
  });
      window.addEventListener("resize", () => {
        positionParamFlyout();
        syncResultFit();
      });

      renderAll(false);
    </script>
  </body>
</html>
